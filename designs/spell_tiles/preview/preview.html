<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spell Tiles — CAD Preview</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/",
        "openscad-customizer-web": "https://cdn.jsdelivr.net/npm/openscad-customizer-web@0.3.0/dist/index.js",
        "openscad-customizer-web/": "https://cdn.jsdelivr.net/npm/openscad-customizer-web@0.3.0/dist/"
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --mono:    'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
      --oscw-bg: var(--bg);
      --oscw-surface: var(--surface);
      --oscw-border: var(--border);
      --oscw-text: var(--text);
      --oscw-muted: var(--muted);
      --oscw-accent: var(--accent);
      --oscw-mono: var(--mono);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    header p  { font-size: 12px; color: var(--muted); }
    .gh-link  { margin-left: auto; font-size: 12px; color: var(--accent); text-decoration: none; white-space: nowrap; }
    .gh-link:hover { text-decoration: underline; }

    main {
      display: grid;
      grid-template-columns: 260px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Controls panel ──────────────────────────────────────────── */
    .controls {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .mode-options { display: flex; flex-direction: column; gap: 6px; }
    .mode-option {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .mode-option:hover { background: var(--surface); }
    .mode-option.active { border-color: var(--accent); background: var(--surface); }
    .mode-option input { margin-top: 3px; accent-color: var(--accent); }
    .mode-option .mtitle { font-weight: 500; font-size: 13px; }
    .mode-option .mdesc { font-size: 11px; color: var(--muted); margin-top: 1px; }

    #scad-form { min-height: 0; }

    /* ── 3-D Viewer ──────────────────────────────────────────────── */
    .viewer {
      position: relative;
      overflow: hidden;
    }

    #preview {
      display: block;
      width: 100%;
      height: 100%;
    }

    #debug-log {
      display: none;
      position: absolute;
      top: 8px; left: 8px; right: 8px;
      max-height: 140px;
      overflow-y: auto;
      background: rgba(0,0,0,0.78);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 6px 8px 6px 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: #adbac7;
      pointer-events: none;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #btn-copy-log {
      position: absolute;
      top: 12px; right: 12px;
      pointer-events: all;
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 10px;
      font-family: var(--mono);
      cursor: pointer;
      z-index: 1;
      transition: background 0.1s, color 0.1s;
    }
    #btn-copy-log:hover { background: var(--accent); color: #0d1117; }

    .viewer-footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 14px 16px 12px;
      background: linear-gradient(transparent, rgba(13,17,23,0.85) 40%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    #status {
      font-size: 12px;
      color: var(--muted);
      transition: color 0.15s;
    }
    #status.busy  { color: var(--accent); }
    #status.error { color: #f85149; }
    #status.ok    { color: #3fb950; }

    #btn-download {
      pointer-events: all;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    #btn-download:disabled { opacity: 0.35; cursor: not-allowed; }
    #btn-download:not(:disabled):hover { background: #79c0ff; }
  </style>
</head>
<body>

<header>
  <h1>Spell Tiles</h1>
  <p>CAD Preview</p>
  <a class="gh-link" href="https://github.com/TheFehr/ttrpg-prints" target="_blank" rel="noopener">GitHub ↗</a>
</header>

<main>
  <nav class="controls" id="controls-panel">
    <div class="field">
      <div class="field-label">View</div>
      <div class="mode-options" id="view-options">
        <label class="mode-option" data-view="tile">
          <input type="radio" name="view" value="tile" checked>
          <span><div class="mtitle">Single Tile</div><div class="mdesc">One tile with the letter below.</div></span>
        </label>
        <label class="mode-option" data-view="plate">
          <input type="radio" name="view" value="plate">
          <span><div class="mtitle">Full Plate</div><div class="mdesc">Every tile at once, at the configured pitch. Slower to render.</div></span>
        </label>
      </div>
    </div>

    <!-- Populated by buildForm() from spell_tile.scad's or
         spell_tile_plate.scad's own Customizer annotations, depending on
         View -- no per-project form markup here. -->
    <div id="scad-form"></div>
  </nav>

  <div class="viewer">
    <canvas id="preview"></canvas>
    <div id="debug-log"></div>
    <button id="btn-copy-log" style="display:none" title="Copy debug log">Copy</button>
    <div class="viewer-footer">
      <span id="status">Loading…</span>
      <button id="btn-download" disabled>⬇ Download</button>
    </div>
  </div>
</main>

<script type="module">
import * as THREE from 'three';
import { STLLoader }    from 'three/addons/loaders/STLLoader.js';
import { ThreeMFLoader } from 'three/addons/loaders/3MFLoader.js';
import {
  parseCustomizer, buildForm, Viewer,
  offToTrianglePositions, trianglesToStl, downloadStl,
  buildMultiColor3mf, downloadMultiColor3mf,
} from 'openscad-customizer-web';

const TILE_URL  = new URL('../spell_tile.scad', import.meta.url).href;
const PLATE_URL = new URL('../spell_tile_plate.scad', import.meta.url).href;
const LIB_URL   = new URL('../../../lib/pillow_tile.scad', import.meta.url).href;

// ── Debug log ─────────────────────────────────────────────────────────────────
const debugEl  = document.getElementById('debug-log');
const copyBtn  = document.getElementById('btn-copy-log');
const debugMode = new URLSearchParams(location.search).has('debug');
if (debugMode) { debugEl.style.display = 'block'; copyBtn.style.display = 'block'; }
function dbg(msg) {
  if (!debugMode) return;
  debugEl.textContent += msg + '\n';
  debugEl.scrollTop = debugEl.scrollHeight;
}
copyBtn.addEventListener('click', () => {
  const text = debugEl.textContent;
  const confirm = () => { copyBtn.textContent = 'Copied!'; setTimeout(() => copyBtn.textContent = 'Copy', 1500); };
  if (navigator.clipboard) navigator.clipboard.writeText(text).then(confirm);
});

// ── Viewer (Three.js scene, incl. the Bambu P1S/P2S 256mm bed outline) ────────
const viewer = new Viewer({
  canvas: document.getElementById('preview'),
  backgroundColor: 0x0d1117,
  bedSize: 256,
});

// ── Pre-generated plates ────────────────────────────────────────────────────
// Full-plate renders go through openscad-wasm's CGAL-only backend (no
// Manifold support in that build), so they can take 1-6 minutes. The 6
// "expected" combos (2 letter sets x 3 modes, at the plate's own default
// letter size/depth/font/pitch) are pre-rendered offline with real desktop
// openscad-nightly (has Manifold, seconds not minutes) and committed as
// static files in pregen/ -- when the current form values match a preset
// exactly (including the *unedited* letter grid text), load that file
// directly and skip the WASM worker entirely.
function pregenPath(view, values) {
  if (view !== 'plate') return null;
  const d = plateSchema.defaults;
  if (values.letter_size !== d.letter_size) return null;
  if (values.letter_depth !== d.letter_depth) return null;
  if (values.letter_font !== d.letter_font) return null;
  if (values.pitch !== d.pitch) return null;
  const lang = values.letter_set;
  if (lang !== 'german' && lang !== 'english') return null;
  const activeKey = lang === 'english' ? 'letters_english' : 'letters_german';
  if (values[activeKey] !== d[activeKey]) return null;
  const ext = values.letter_mode === 'inlay' ? '3mf' : 'stl';
  return `./pregen/${lang}-${values.letter_mode}.${ext}`;
}

async function loadPregenObject(url) {
  let object3d;
  if (url.endsWith('.3mf')) {
    object3d = await new ThreeMFLoader().loadAsync(url);
  } else {
    const geometry = await new STLLoader().loadAsync(url);
    const material = new THREE.MeshPhongMaterial({ color: 0x3a8c8c, flatShading: true, side: THREE.DoubleSide });
    object3d = new THREE.Mesh(geometry, material);
  }
  object3d.rotation.x = -Math.PI / 2; // Z-up -> Y-up, matches Viewer.loadParts()
  viewer.presentObject(object3d);
}

// ── Form: two independent schemas (Tile / Plate), swapped by View ─────────────
let tileSchema, plateSchema;
let currentForm = null;

async function loadSchemas() {
  const [tileSrc, plateSrc] = await Promise.all([
    fetch(TILE_URL).then((r) => r.text()),
    fetch(PLATE_URL).then((r) => r.text()),
  ]);
  tileSchema = parseCustomizer(tileSrc);
  plateSchema = parseCustomizer(plateSrc);
}

function currentView() {
  return viewsEl.querySelector('input[name="view"]:checked').value;
}

function buildActiveForm() {
  const view = currentView();
  const schema = view === 'plate' ? plateSchema : tileSchema;
  currentForm = buildForm(document.getElementById('scad-form'), schema, {
    storageKey: `spelltile-${view}-params`,
    onChange: () => scheduleRender(),
  });
}

const viewsEl = document.getElementById('view-options');
const savedView = localStorage.getItem('spelltile-view');
if (savedView) {
  const r = viewsEl.querySelector(`input[value="${savedView}"]`);
  if (r) r.checked = true;
}
function syncViewStyles() {
  for (const opt of viewsEl.querySelectorAll('.mode-option')) {
    opt.classList.toggle('active', opt.querySelector('input').checked);
  }
}
syncViewStyles();
viewsEl.addEventListener('change', () => {
  syncViewStyles();
  localStorage.setItem('spelltile-view', currentView());
  buildActiveForm();
  triggerRender();
});

// ── Worker orchestration ─────────────────────────────────────────────────────
// Two instances of the library's *stock* worker.js (not a project-custom
// one) -- as of openscad-customizer-web@0.2.0 it supports declarative
// multi-pass rendering (`multiPass`: force the entry file's trailing call
// to N different module invocations, one render pass each, tag each OFF
// with a color -- what "inlay" mode needs, since OpenSCAD's OFF export
// carries no color()) and a configurable text-glyph-override target file
// (`textGlyphs.targetFsPath` -- Plate view's glyph-calling module lives in
// spell_tile.scad, a `use <...>` dependency of the entry file, not the
// entry file itself). Both used to require a hand-written custom worker;
// see change_request_multipass.md in openscad-customizer-web for the writeup.
//
// One worker per view (not one shared worker) because each worker caches
// its fetched sources keyed to a single, fixed entryUrl -- and because it
// makes "did this response arrive for the view still on screen" trivial to
// check below, with no request-id bookkeeping needed.
// A local same-origin shim, not the CDN URL directly -- see worker-shim.js.
const WORKER_URL = new URL('./worker-shim.js', import.meta.url);
const TILE_FS_PATH  = '/designs/spell_tiles/spell_tile.scad';
const PLATE_FS_PATH = '/designs/spell_tiles/spell_tile_plate.scad';
const LIB_FS_PATH   = '/lib/pillow_tile.scad';

const tileWorker  = new Worker(WORKER_URL, { type: 'module' });
const plateWorker = new Worker(WORKER_URL, { type: 'module' });
for (const [w, label] of [[tileWorker, 'tile'], [plateWorker, 'plate']]) {
  w.onerror = (e) => {
    dbg(`WORKER ERROR (${label}): ` + (e.message || JSON.stringify(e)));
    setStatus('Worker error — add ?debug to URL for details', 'error');
  };
}

const statusEl = document.getElementById('status');
const dlBtn    = document.getElementById('btn-download');
function setStatus(text, cls = '') { statusEl.textContent = text; statusEl.className = cls; }

let lastModel = null;
let renderTimer = null;
let rendering = false;
let pendingRender = false;

// `forView` is fixed per-worker (tileWorker always renders Tile), not
// re-derived from the DOM at message time -- if the user switches View
// while a render is in flight, the eventual response is for a view that's
// no longer on screen, and gets dropped rather than clobbering the
// now-active view's model with stale geometry.
function handleWorkerMessage(forView, data) {
  if (data.type === 'log') { dbg(data.text); return; }
  if (forView !== currentView()) {
    if (data.type === 'result' || data.type === 'error') finishRender();
    return;
  }
  if (data.type === 'result') {
    lastModel = { parts: data.parts, view: forView, values: data.values };
    dlBtn.disabled = data.parts.length === 0;
    viewer.loadParts(data.parts);
    setStatus('Ready — drag to rotate, scroll to zoom', 'ok');
    finishRender();
  } else if (data.type === 'error') {
    dbg('[error] ' + data.message);
    setStatus('Error: ' + data.message, 'error');
    finishRender();
  }
}
tileWorker.onmessage  = ({ data }) => handleWorkerMessage('tile', data);
plateWorker.onmessage = ({ data }) => handleWorkerMessage('plate', data);

function finishRender() {
  rendering = false;
  if (pendingRender) { pendingRender = false; triggerRender(); }
}

// strings needed for the browser's opentype.js glyph override -- one per
// unique letter actually shown (single letter in Tile view, every distinct
// character in the active grid for Plate view).
function textGlyphStrings(view, values) {
  if (view !== 'plate') return [values.letter];
  const active = values.letter_set === 'english' ? values.letters_english : values.letters_german;
  return [...new Set(String(active ?? '').replace(/\n/g, '').split(''))];
}

// The one piece of genuinely project-specific data multi-part rendering
// needs: which alternate module calls exist, and what color each gets.
function multiPassFor(view, values) {
  if (values.letter_mode !== 'inlay') return null;
  return view === 'plate'
    ? {
        defaultCallPattern: '\\nspell_tile_plate\\(\\);\\s*$',
        passes: [
          { call: 'spell_tile_plate_base();', color: '#DCDCDC' },
          { call: 'spell_tile_plate_plug();', color: '#DC143C' },
        ],
      }
    : {
        defaultCallPattern: '\\nspell_tile\\(\\);\\s*$',
        passes: [
          { call: 'spell_tile_base();', color: '#DCDCDC' },
          { call: 'spell_tile_plug();', color: '#DC143C' },
        ],
      };
}

function triggerRender() {
  if (!tileSchema) return; // schemas not loaded yet
  if (rendering) { pendingRender = true; return; }
  rendering = true;

  const view = currentView();
  const values = currentForm ? currentForm.getValues() : (view === 'plate' ? plateSchema.defaults : tileSchema.defaults);
  const pregen = pregenPath(view, values);

  if (pregen) {
    const lang = values.letter_set === 'english' ? 'English' : 'German';
    setStatus(`Loading pre-generated plate (${lang}, ${values.letter_mode})…`, 'busy');
    loadPregenObject(pregen)
      .then(() => {
        lastModel = { pregenUrl: pregen, view, values };
        dlBtn.disabled = false;
        setStatus('Ready — drag to rotate, scroll to zoom', 'ok');
      })
      .catch((err) => {
        dbg('[pregen] ' + (err.message || err));
        setStatus('Pregen load failed: ' + (err.message || err), 'error');
      })
      .finally(finishRender);
    return;
  }

  const isInlay = values.letter_mode === 'inlay';
  const what = view === 'plate'
    ? `full plate (${values.letter_set}) — ` + (isInlay ? 'expect ~3-6 min (2 passes)…' : 'expect ~1-2 min…')
    : `"${values.letter || '(blank)'}" — ${values.letter_mode}…`;
  setStatus(`Rendering ${what}`, 'busy');

  const worker = view === 'plate' ? plateWorker : tileWorker;
  worker.postMessage({
    type: 'render',
    entryUrl: view === 'plate' ? PLATE_URL : TILE_URL,
    entryFsPath: view === 'plate' ? PLATE_FS_PATH : TILE_FS_PATH,
    files: view === 'plate'
      ? [{ url: LIB_URL, fsPath: LIB_FS_PATH }, { url: TILE_URL, fsPath: TILE_FS_PATH }]
      : [{ url: LIB_URL, fsPath: LIB_FS_PATH }],
    values,
    textGlyphs: {
      enabled: true,
      strings: textGlyphStrings(view, values),
      fontSize: values.letter_size ?? 10,
      targetFsPath: view === 'plate' ? TILE_FS_PATH : undefined,
    },
    multiPass: multiPassFor(view, values),
    timeoutSec: view === 'tile' ? 90 : (isInlay ? 600 : 300),
  });
}

function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(triggerRender, 400);
}

// ── Download ──────────────────────────────────────────────────────────────────
// Pregen hits: download the static file directly, no reconstruction.
// Pocket/flush: single STL. Inlay: one .3mf with both colors baked in (3MF
// Materials Extension <m:colorgroup> -- what Bambu Studio/OrcaSlicer/
// PrusaSlicer actually read for per-part filament assignment).
dlBtn.addEventListener('click', () => {
  if (!lastModel) return;

  if (lastModel.pregenUrl) {
    const a = Object.assign(document.createElement('a'), {
      href: lastModel.pregenUrl,
      download: lastModel.pregenUrl.split('/').pop(),
    });
    a.click();
    return;
  }

  const { view, values, parts } = lastModel;
  const base = view === 'plate'
    ? `spelltile-plate-${values.letter_set}-${values.letter_mode}`
    : `spelltile-${(values.letter || 'blank').replace(/[^a-zA-Z0-9]/g, '') || 'blank'}-${values.letter_mode}`;

  if (values.letter_mode === 'inlay' && parts.length === 2) {
    downloadMultiColor3mf(parts.map((p) => ({ off: p.off, colorHex: p.color ?? '#888888' })), `${base}.3mf`);
    return;
  }

  const positions = offToTrianglePositions(parts[0].off);
  if (!positions?.length) return;
  downloadStl(positions, `${base}.stl`);
});

// ── Boot ──────────────────────────────────────────────────────────────────────
setStatus('Loading OpenSCAD WASM (~14 MB, cached after first visit)…', 'busy');
loadSchemas().then(() => {
  buildActiveForm();
  triggerRender();
});
</script>

</body>
</html>
